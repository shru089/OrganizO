[build]
  publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking - no one can embed your site in an iframe
    X-Frame-Options = "DENY"
    
    # Prevent MIME-type sniffing attacks
    X-Content-Type-Options = "nosniff"
    
    # Enable XSS protection in older browsers
    X-XSS-Protection = "1; mode=block"
    
    # Control how much referrer info is sent
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Only allow HTTPS connections (after first visit)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    
    # Permissions Policy - disable unused browser APIs
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    
    # Content Security Policy - only allow scripts and styles from same origin + Google Fonts
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.emailjs.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
